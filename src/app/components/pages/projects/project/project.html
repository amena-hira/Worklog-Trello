<div class="card w-full bg-base-100 shadow-sm">
  <div class="card-body">
    <h2 class="text-2xl font-bold">Project Alpha</h2>
    <span class="badge badge-sm badge-ghost">Client Work</span>
    <progress class="progress w-full h-1.5 text-sky-600 my-2" value="75" max="100"></progress>
    <div class="flex justify-between items-center">
      <p class="text-sm text-gray-500">12 tasks remaining</p>
      <p class="text-sm text-end">75%</p>
    </div>
    <hr class="text-gray-200 my-3">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2 text-sm text-gray-500">
        <i class="fa-regular fa-calendar"></i>
        <p>Due in 3 days</p>
      </div>
      <div>
        @for (image of assigneeAvatar.images; track $index) {
                <div class="avatar">
                  <div class="w-5 rounded-full">
                    <img src="{{ image }}" alt="Avatar" />
                  </div>
                </div>
              }
      </div>
    </div>
  </div>
</div>
