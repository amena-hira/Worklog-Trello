<div class="card bg-base-100 rounded-2xl shadow-sm p-4 h-full">
  <div class="overflow-x-auto md:overflow-visible">
    <h3 class="card-title">Upcoming Due Dates</h3>
    <hr class="text-gray-200 mt-3" />
    <table class="table table-zebra">
      <tbody>
        <!-- row 1 -->
        @for (task of priority_Tasks; track $index) {
          <tr>
            <th>
              <div class="flex items-center gap-2">
                <div>
                  <i class="fa-solid fa-square-check {{ task.textColor }} text-xl mt-1"></i>
                </div>
                <h2 class="font-semibold">{{ task.name }}</h2>
              </div>
            </th>
            <td>
              <h4 class="badge badge-sm {{ task.bgColor }} {{ task.textColor }} whitespace-nowrap">
                {{ task.project }}
              </h4>
            </td>
            <td>
              <i class="fa-regular fa-calendar {{ task.textColor }} font-light text-xs"></i>
              <span [ngClass]="task.dueDays < 0 ? 'text-error font-semibold' : ''">{{ task.dueDate }}</span>
            </td>
            <td class="text-center">
              <button type="button" class="btn btn-ghost btn-sm text-left">
                <i class="fa-solid fa-trash-can"></i>
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
