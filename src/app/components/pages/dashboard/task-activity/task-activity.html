<!-- Team Members Card -->
<div class="bg-base-100 rounded-xl p-5 shadow-sm h-full">
  <div class="w-full">
    <!-- Header -->
    <h3 class="font-semibold text-base">Recent Activity</h3>
    <div class="border-b border-gray-100 mt-2"></div>

    @if (loading) {
      <div class="flex justify-center items-center py-8">
        <span class="loading loading-spinner loading-md text-gray-400"></span>
      </div>
    } @else {
      <!-- List -->
      <div class="mt-3 space-y-4">
        <!-- Item -->
        @for (activity of activities; track $index) {
          <div class="flex items-start justify-between">
            <div class="flex items-start gap-3">
              <div class="avatar indicator relative">
                <div class="w-10 rounded-full">
                  <img src="{{ activity.image }}" />
                </div>

                <!-- responsive online dot -->
                <span class="absolute bottom-0 right-0 translate-x-[10%] translate-y-[10%]">
                  @if (activity.isActive) {
                    <span
                      class="block rounded-full bg-green-600 border-2 border-white w-[30%] aspect-square min-w-3 max-w-4"
                    ></span>
                  } @else {
                    <span
                      class="block rounded-full bg-yellow-400 border-2 border-white w-[30%] aspect-square min-w-3 max-w-4"
                    ></span>
                  }
                </span>
              </div>
              <div>
                <p class="text-sm font-semibold leading-tight">{{ activity.name }}</p>
                <p class="text-xs text-base-content/60">
                  Activity "<span class="font-bold">{{ activity.task }}</span
                  >"
                </p>
                <p class="text-xs text-base-content/65">{{ activity.time }}</p>
              </div>
            </div>
          </div>
        } @empty {
          <!-- Empty State -->
          <div class="flex flex-col items-center justify-center py-6 text-gray-400">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-12 h-12 mb-2"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.5"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
              />
            </svg>
            <p class="text-sm font-medium">No recent activity</p>
          </div>
        }
      </div>
    }
  </div>
</div>
