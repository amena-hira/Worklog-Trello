<div class="bg-base-100 rounded-lg">
      <div class="card w-full shadow-sm">
        <div class="card-body">
          <h2 class="card-title mb-4">Task Activity</h2>
          <div class="flex flex-col gap-4">
            @for (activity of taskActivity; track $index) {
              <div class="flex items-start gap-4">
                <div class="w-10 h-10 rounded bg-gray-200 flex items-center justify-center">
                  <i class="fa-solid fa-user text-gray-500"></i>
                </div>
                <div>
                  <p>
                    <span class="font-semibold">{{ activity.user }}</span>
                    {{ activity.status }} Task
                    <span class="font-semibold">{{ activity.task }}</span>
                  </p>
                  <p class="text-sm text-gray-600">{{ activity.time }}</p>
                </div>
              </div>
            }
          </div>
        </div>
      </div>
    </div>
