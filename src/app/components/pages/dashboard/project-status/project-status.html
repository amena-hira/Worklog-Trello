<div class="shadow-sm rounded-lg bg-base-100">
      <div class="card-body">
        <h2 class="card-title">Project Status</h2>
      </div>
      <div class="px-4">
        @for (project of projectStatus; track $index) {
          <div class="flex gap-4 shadow-sm pt-2 px-4 mb-4 border border-gray-200 rounded-lg">
            <div>
              <p
                class="flex items-center justify-center w-10 h-10 {{
                  project.background
                }} rounded-full"
              >
                <i class="{{ project.icon }} {{ project.textColor }} text-2xl"></i>
              </p>
            </div>
            <div class="flex-1">
              <div class="flex justify-between">
                <div>
                  <p>{{ project.name }}</p>
                  <p class="text-sm text-gray-600">{{ project.progress }}% complete</p>
                </div>
                <div class="text-right">
                  <p class="badge {{ project.textColor }} {{ project.background }}  bg-opacity-20">
                    {{ project.status }}
                  </p>
                  <div class="text-sm text-gray-600">
                    <i class="fa-regular fa-clock text-gray-500 mr-1"></i>
                    <span>{{ project.dueDate }}</span>
                  </div>
                </div>
              </div>
              <progress
                class="progress {{ project.textColor }} w-full"
                value="{{ project.progress }}"
                max="100"
              ></progress>
            </div>
          </div>
        }
      </div>
    </div>
