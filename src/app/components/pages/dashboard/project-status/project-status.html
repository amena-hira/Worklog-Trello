<div class="card bg-base-100 rounded-2xl shadow-sm p-4 h-full">
  <div class="flex justify-between">
    <h2 class="card-title">Projects</h2>
    <div class="flex items-center justify-center">
      <p class="btn btn-link text-sky-700 text-sm mt-0.5" routerLink="/projects">View All</p>
      <div>
        <i class="fa-solid fa-angle-right text-xs"></i>
      </div>
    </div>
  </div>
  <ul class="list">
    @for (project of allProjectStatus; track project.name) {
      <div class="border-b border-gray-100 my-2"></div>
      <li class="flex justify-between gap-2">
        <div class="flex gap-2 flex-2">
          <div class="mt-0.5">
            <i class="fa-solid fa-square text-{{project.color}}-600 "></i>
          </div>
          <div class="w-full">
            <h2 class="font-semibold text-base">{{ project.name }}</h2>
            <progress class="progress w-full h-1.5 text-{{project.color}}-600" value="{{project.progress}}" max="100"></progress>
          </div>

        </div>
        <div class="flex flex-col items-center flex-1 mt-0.5">
          <p>{{project.progress}}%</p>
          <h2 class="text-{{project.color}}-600 text-sm">{{project.totalDue}} tasks due</h2>
        </div>
        <div>
          <i class="fa-solid fa-ellipsis"></i>
        </div>
      </li>
    }
  </ul>
</div>
