<div class="card bg-base-100 rounded-2xl shadow-sm p-4 sm:p-5">
  <!-- Header -->
  <div class="flex items-start justify-between gap-3">
    <h2 class="card-title text-base sm:text-lg">Task Progress</h2>

    <div class="flex flex-wrap items-center justify-end gap-2 sm:gap-3 text-xs text-base-content/60">
      <span class="flex items-center gap-1">
        <span class="status bg-info"></span> 12
      </span>
      <span class="flex items-center gap-1">
        <span class="status bg-warning"></span> 46
      </span>
      <span class="flex items-center gap-1">
        <span class="status bg-success"></span> 35
      </span>
    </div>
  </div>

  <div class="border-b border-base-200 my-3"></div>

  <!-- Content -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-5 md:gap-6 items-center">
    <!-- Donut -->
    <div class="flex justify-center md:justify-start">
      <!-- Responsive chart box -->
      <div class="relative w-full max-w-[260px] sm:max-w-[300px]">
        <div class="relative h-40 sm:h-44 md:h-48 lg:h-52 w-full">
          <canvas id="taskChart"></canvas>

          <div
            class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none"
          >
            <div class="text-2xl sm:text-3xl font-semibold leading-none">24</div>
            <div class="text-[11px] sm:text-xs text-base-content/60 mt-1">
              Total Tasks
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Legend -->
    <div class="flex flex-col gap-2 w-full">
      <div
        class="flex items-center justify-between rounded-xl px-3 py-2 bg-base-200/40"
      >
        <p class="flex items-center gap-2 text-sm text-base-content/70">
          <i class="fa-solid fa-circle text-[10px] text-success"></i>
          <span>Completed</span>
        </p>
        <p class="text-sm font-semibold text-success">8</p>
      </div>

      <div
        class="flex items-center justify-between rounded-xl px-3 py-2 bg-base-200/40"
      >
        <p class="flex items-center gap-2 text-sm text-base-content/70">
          <i class="fa-solid fa-circle text-[10px] text-info"></i>
          <span>In Progress</span>
        </p>
        <p class="text-sm font-semibold text-info">7</p>
      </div>

      <div
        class="flex items-center justify-between rounded-xl px-3 py-2 bg-base-200/40"
      >
        <p class="flex items-center gap-2 text-sm text-base-content/70">
          <i class="fa-solid fa-circle text-[10px] text-warning"></i>
          <span>Pending</span>
        </p>
        <p class="text-sm font-semibold text-warning">9</p>
      </div>
    </div>
  </div>
</div>
