<div class="card bg-base-100 rounded-2xl shadow-sm p-4 h-full">
  <div>
    <h2 class="card-title">Today's Task</h2>
  </div>
  <ul class="list">
    @for(task of today_tasks; track task.id){

      <div class="border-b border-gray-100 my-2"></div>
      <li class="flex justify-between items-center">
        <div class="flex gap-2">
          <div>
            <input type="checkbox" class="checkbox checkbox-xs rounded-sm" />
          </div>
          <div>
            <h2 class="font-semibold">{{task.name}}</h2>
            <h4 class="badge badge-sm bg-{{task.projectColor}}-100 text-{{task.projectColor}}-700 whitespace-nowrap">{{task.projectName}}</h4>
          </div>
        </div>

        <div class="flex gap-1">
          <h2 class="badge badge-sm bg-{{task.projectColor}}-100 text-{{task.projectColor}}-700 whitespace-nowrap">{{task.priority}}</h2>
          <div>
            <i class="fa-regular fa-clock text-{{task.projectColor}}-700 font-light text-xs"></i>
            <span class="text-{{task.projectColor}}-700 font-light text-sm">{{task.dueDate}}</span>
          </div>
        </div>
      </li>
    }
  </ul>
  <div class="mx-auto mt-4">
    <button class="btn bg-sky-950 text-white px-6 rounded-xl hover:bg-sky-800" onclick="add_task.showModal()">
    <i class="fa-solid fa-plus"></i>
    Add New Task
  </button>
  </div>
  <app-form-project-task [editData]="selectedTaskForEdit"></app-form-project-task>
</div>
