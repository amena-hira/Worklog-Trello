<!-- Team Members Card -->
<div class="bg-base-100 rounded-xl p-5 shadow-sm h-full">
  <div class="w-full">
    <!-- Header -->
    <div class="flex items-center justify-between">
      <h3 class="font-semibold text-base">Team Members</h3>
      <a class="text-xs text-primary hover:underline cursor-pointer">View All</a>
    </div>
    <div class="border-b border-gray-100 mt-2"></div>

    @if (loading) {
      <div class="flex justify-center items-center py-8">
        <span class="loading loading-spinner loading-md text-gray-400"></span>
      </div>
    } @else {
      <!-- List -->
      <div class="mt-3 space-y-4">
        <!-- Item -->
        @for (member of members; track $index) {
          <div class="flex items-start justify-between">
          <div class="flex items-center gap-3">
            <div class="avatar indicator relative">
              <div class="w-10 rounded-full">
                <img src="{{ member.image }}" />
              </div>

              <!-- responsive online dot -->
              <span class="absolute bottom-0 right-0 translate-x-[10%] translate-y-[10%]">
                @if (member.isActive) {
                  <span
                    class="block rounded-full bg-green-600 border-2 border-white w-[30%] aspect-square min-w-3 max-w-4"
                  ></span>
                } @else {
                  <span
                    class="block rounded-full bg-yellow-400 border-2 border-white w-[30%] aspect-square min-w-3 max-w-4"
                  ></span>
                }
              </span>
            </div>
            <div>
              <p class="text-sm font-semibold leading-tight">{{ member.name }}</p>
              <p class="text-xs text-base-content/60">{{ member.role }}</p>
            </div>
          </div>

          <div>
            @if (member.isActive) {
              <span class="status bg-green-600"></span>
            } @else {
              <span class="status bg-yellow-500"></span>
            }
          </div>
        </div>
        } @empty {
          <!-- Empty State -->
          <div class="flex flex-col items-center justify-center py-6 text-gray-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            <p class="text-sm font-medium">No team members yet</p>
          </div>
        }
      </div>
    }

    <!-- Button -->
    <button
      title="Coming soon..."
      class="btn bg-white text-black border-[#e5e5e5] flex items-center justify-center gap-2 rounded-lg mx-auto mt-6 hover:cursor-help"
    >
      <i class="fa-solid fa-user-plus block text-md"></i>
      <span class="is-drawer-close:hidden block text-xs font-semibold">Invite teammates</span>
    </button>
  </div>
</div>
