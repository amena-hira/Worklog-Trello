<!-- Team Members Card -->
<div class="bg-base-100 rounded-xl p-5 shadow-sm h-full">
  <div class="w-full">
    <!-- Header -->
    <div class="flex items-center justify-between">
      <h3 class="font-semibold text-base">Team Members</h3>
      <a class="text-xs text-primary hover:underline cursor-pointer">View All</a>
    </div>
    <div class="border-b border-gray-100 mt-2"></div>

    <!-- List -->
    <div class="mt-3 space-y-4">
      <!-- Item -->
      @for (member of members; track $index) {
        <div class="flex items-start justify-between">
          <div class="flex items-center gap-3">
            <div class="avatar indicator relative">
              <div class="w-10 rounded-full">
                <img src="{{ member.image }}" />
              </div>

              <!-- responsive online dot -->
              <span class="absolute bottom-0 right-0 translate-x-[10%] translate-y-[10%]">
                @if (member.isActive) {
                  <span
                    class="block rounded-full bg-green-600 border-2 border-white w-[30%] aspect-square min-w-3 max-w-4"
                  ></span>
                } @else {
                  <span
                    class="block rounded-full bg-yellow-400 border-2 border-white w-[30%] aspect-square min-w-3 max-w-4"
                  ></span>
                }
              </span>
            </div>
            <div>
              <p class="text-sm font-semibold leading-tight">{{ member.name }}</p>
              <p class="text-xs text-base-content/60">{{ member.role }}</p>
            </div>
          </div>

          <div>
            @if (member.isActive) {
              <span class="status bg-green-600"></span>
            } @else {
              <span class="status bg-yellow-500"></span>
            }
          </div>
        </div>
      }
    </div>

    <!-- Button -->
    <button
      class="btn bg-white text-black border-[#e5e5e5] flex items-center justify-center gap-2 rounded-lg mx-auto mt-6"
    >
      <i class="fa-solid fa-user-plus block text-md"></i>
      <span class="is-drawer-close:hidden block text-xs font-semibold">Invite teammates</span>
    </button>
  </div>
</div>
