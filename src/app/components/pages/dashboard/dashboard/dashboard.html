<div class="p-4">
  <!-- Card for tasks -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 justify-items-center gap-4">
    @for (card of cards; track card.title) {
      <div class="card w-full bg-base-100 card-md shadow-sm">
        <div class="card-body">
          <h2 class="card-title text-xl">{{ card.title }}</h2>
          <div class="flex justify-between items-end card-actions pt-8">
            <div>
              <span class="text-lg font-semibold text-gray-800">{{ card.total }}</span>
              <p class="text-sm text-gray-600">Task count</p>
            </div>
            <div>
              <span class="text-xl {{ card.color }}">
                <i class="{{ card.icon }}"></i>
              </span>
            </div>
          </div>
        </div>
      </div>
    }
  </div>

  <!-- Task & Project Status -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 [.drawer-toggle:checked~.drawer-content_&]:grid-cols-2 gap-4 pt-6 items-start">
    <!-- Priority Task Table -->
    <app-prioroty-table></app-prioroty-table>
    <!-- Project Status Card -->
    <app-project-status></app-project-status>
    <!-- Task Activity -->
    <app-task-activity></app-task-activity>
    <!-- Task calender -->
    <app-calender></app-calender>
  </div>
</div>
