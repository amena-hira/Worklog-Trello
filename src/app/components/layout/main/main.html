<div class="drawer md:drawer-open">
  <input id="my-drawer" type="checkbox" class="drawer-toggle" />
  <div class="drawer-content">
    <nav class="navbar md:hidden bg-base-100">
      <label
        for="my-drawer"
        aria-label="open sidebar"
        class="bg-base-100 btn btn-square btn-ghost"
      >
        <i class="fa-solid fa-bars inline-block h-6 w-6 stroke-current"></i>
      </label>
    </nav>
    <router-outlet />
  </div>
  <div class="drawer-side is-drawer-close:overflow-visible border-r-2 border-base-300 shadow overflow-y-scroll overscroll-contain">
    <label for="my-drawer" aria-label="close sidebar" class="drawer-overlay"></label>
    <app-navbar></app-navbar>
  </div>
</div>
