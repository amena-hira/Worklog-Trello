<div class="drawer lg:drawer-open">
  <input id="my-drawer" type="checkbox" class="drawer-toggle" />
  <div class="drawer-content flex flex-col bg-base-100">
    <!-- Navbar -->
    <app-navbar class="sticky top-0 z-10 w-full"></app-navbar>
    <!-- Main content -->
    <div class="lg:rounded-tl-2xl bg-base-200 grow">
      <router-outlet />
    </div>
  </div>
  <!-- Drawer-Sidebar Content -->
  <div
    class="drawer-side is-drawer-close:overflow-visible overflow-y-scroll no-scrollbar overscroll-contain"
  >
    <label for="my-drawer" aria-label="close sidebar" class="drawer-overlay"></label>
    <app-drawer-sidebar></app-drawer-sidebar>
  </div>
</div>
