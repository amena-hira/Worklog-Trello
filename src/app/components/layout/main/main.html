<div class="drawer md:drawer-open">
  <input id="my-drawer" type="checkbox" class="drawer-toggle peer" />
  <label
    for="my-drawer"
    aria-label="open sidebar"
    class="bg-base-100 btn btn-square btn-ghost fixed top-4 right-4 z-50 md:hidden peer-checked:hidden"
  >
    <i class="fa-solid fa-bars inline-block"></i>
  </label>
  <div class="drawer-content">
    <router-outlet />
  </div>
  <div
    class="drawer-side is-drawer-close:overflow-visible border-r-2 border-base-300 shadow overflow-y-scroll overscroll-contain"
  >
    <label for="my-drawer" aria-label="close sidebar" class="drawer-overlay"></label>
    <app-navbar></app-navbar>
  </div>
</div>
