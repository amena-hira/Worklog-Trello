
<dialog #delete_modal  class="modal">
  <div class="modal-box">
    <p class="py-4 text-center">Are you sure you want to delete this {{ itemType }}?</p>
    <div class="modal-action">
      <form method="dialog">
        <button type="button" class="btn mr-2" (click)="close()">Cancel</button>
        <button type="button" class="btn btn-error" (click)="confirmDelete()">Delete</button>
      </form>
    </div>
  </div>
</dialog>
