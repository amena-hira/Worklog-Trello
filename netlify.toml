[build]
  command = "npm run build"
  # Fix: Use capital 'T' because Linux servers are case-sensitive
  publish = "dist/Todo/browser"

[build.environment]
  # Fix: Force Netlify to use Node 20, which is required by Angular 17+ and the Netlify Angular plugin
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200